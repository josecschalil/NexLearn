
services:
  db:
    image: postgres:14
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: jeeneetpulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  django:
    build:
      context: ./backend  # Build the Django app from the backend folder
    container_name: django_container
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app  # Mount the backend directory inside the container
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://postgres:1234@db:5432/jeeneetpulse
      - DEBUG=1

    

  caddy:
    image: caddy:latest
    container_name: caddy_container
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile  # Your Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django
    networks:
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  backend:
    driver: bridge
